name: Code Connect Automation

on:
  # Run weekly on Monday at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Run on push to main if Code Connect files change
  push:
    branches:
      - main
    paths:
      - '.github/workflows/code-connect.yml'
      - 'scripts/auto-code-connect.js'
      - 'src/SvsUiNova/components/**/*.figma.tsx'
      - '.env.example'

jobs:
  auto-code-connect:
    name: Auto-generate Code Connect
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Run Code Connect automation
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_ID: OQpwpaJZzLCQG8JkGAnbeJ
        run: |
          echo "🚀 Starting Code Connect automation..."
          node scripts/auto-code-connect.js
          echo "✅ Automation completed"
      
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --short)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add .
          git commit -m "chore: Update Code Connect node IDs via automation
          
          - Auto-updated from Figma API
          - GitHub Actions workflow trigger: ${{ github.event_name }}
          - Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      
      - name: Push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin main
      
      - name: Create Pull Request (if needed)
        if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: Update Code Connect node IDs via automation"
          title: "🤖 chore: Update Code Connect node IDs"
          body: |
            # Automated Code Connect Update
            
            This pull request was automatically generated by the Code Connect automation workflow.
            
            ## Changes
            - Fetched latest Figma component data
            - Updated Code Connect node IDs
            - Validated component mappings
            
            ## Next Steps
            1. Review the changes
            2. Run tests if available: `pnpm test`
            3. Merge this PR to main
            
            ---
            *Generated by Code Connect Automation on $(date)*
          branch: "chore/code-connect-update-${{ github.run_number }}"
          delete-branch: true
      
      - name: Workflow Summary
        if: always()
        run: |
          echo "## Code Connect Automation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files Changed:** $(git status --short | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f code-connect-automation.log ]; then
            echo "### Detailed Log" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -20 code-connect-automation.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
